<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Crypto Signals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .buy { background-color: #166534; color: #86efac; }
    .sell { background-color: #991b1b; color: #fda4af; }
    tr:hover { background-color: #18181b; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🚀 Live Crypto Signals</h1>
    <p class="text-center text-zinc-400 mb-8">Top 100 Coins • Live Prices • Multiple Signals</p>

    <div class="flex gap-4 mb-6">
      <button onclick="loadTop100()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl flex items-center gap-2">
        <i class="fas fa-sync"></i> Refresh Live Data
      </button>
      <button onclick="showAddModal()" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-2xl flex items-center gap-2">
        <i class="fas fa-plus"></i> Add Coin
      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="bg-zinc-900 text-left">
            <th class="p-4">#</th>
            <th class="p-4">Coin</th>
            <th class="p-4 text-right">Price</th>
            <th class="p-4 text-right">24h %</th>
            <th class="p-4 text-center">Signal</th>
            <th class="p-4 text-center">Confidence</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="text-sm"></tbody>
      </table>
    </div>
  </div>

  <!-- Add Coin Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">
      <h3 class="text-2xl mb-6">Koi Coin Add Karo</h3>
      <input id="coinInput" type="text" placeholder="bitcoin ya btc" 
             class="w-full bg-zinc-800 px-5 py-4 rounded-2xl text-lg mb-6 focus:outline-none">
      <div class="flex gap-3">
        <button onclick="hideAddModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700">Cancel</button>
        <button onclick="searchCoin()" class="flex-1 bg-blue-600 py-4 rounded-2xl">Search & Analyze</button>
      </div>
    </div>
  </div>

  <script>
    async function loadTop100() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = `<tr><td colspan="6" class="py-20 text-center"><i class="fas fa-spinner fa-spin text-4xl"></i><br><br>Loading Live Data...</td></tr>`;

      try {
        const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&price_change_percentage=24h');
        const coins = await response.json();

        let rows = '';
        coins.forEach(coin => {
          const analysis = getSignal(coin);
          rows += `
            <tr onclick="showCoinDetail('${coin.id}', '${coin.name}', '${coin.symbol}', ${coin.current_price})" class="border-b border-zinc-800 cursor-pointer hover:bg-zinc-900">
              <td class="p-4">${coin.market_cap_rank}</td>
              <td class="p-4 flex items-center gap-3">
                <img src="${coin.image}" width="30" class="rounded-full">
                <div>
                  <div class="font-semibold">${coin.name}</div>
                  <div class="text-xs text-zinc-500">${coin.symbol.toUpperCase()}</div>
                </div>
              </td>
              <td class="p-4 text-right font-mono">$${coin.current_price.toLocaleString()}</td>
              <td class="p-4 text-right ${coin.price_change_percentage_24h >= 0 ? 'text-green-400' : 'text-red-400'}">
                ${coin.price_change_percentage_24h ? coin.price_change_percentage_24h.toFixed(2) : '0'}%
              </td>
              <td class="p-4 text-center">
                <span class="px-6 py-2 rounded-2xl text-sm font-bold ${analysis.class}">${analysis.signal}</span>
              </td>
              <td class="p-4 text-center font-bold">${analysis.confidence}%</td>
            </tr>
          `;
        });

        tbody.innerHTML = rows;
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="py-20 text-center text-red-400">Network Error. Please Refresh.</td></tr>`;
        console.error(err);
      }
    }

    function getSignal(coin) {
      const change = coin.price_change_percentage_24h || 0;
      let score = 50;

      if (change > 5) score += 25;
      if (change > 10) score += 15;
      if (change < -5) score -= 30;
      if (coin.total_volume > 500000000) score += 10; // High volume

      score = Math.max(30, Math.min(95, score));

      if (score >= 75) return { signal: "Strong Buy", class: "buy", confidence: score };
      if (score >= 60) return { signal: "Buy", class: "buy", confidence: score };
      if (score <= 40) return { signal: "Strong Sell", class: "sell", confidence: score };
      if (score <= 50) return { signal: "Sell", class: "sell", confidence: score };
      return { signal: "Neutral", class: "bg-zinc-700", confidence: score };
    }

    async function showCoinDetail(coinId, name, symbol, price) {
      alert(`\nCoin: ${name} (${symbol.toUpperCase()})\nPrice: $${price.toLocaleString()}\n\nDetail view abhi simple hai.\nFull TP/SL + Reasons next update mein add karunga.`);
      // Yahan baad mein full modal daal sakte hain
    }

    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      document.getElementById('coinInput').focus();
    }

    function hideAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    async function searchCoin() {
      const query = document.getElementById('coinInput').value.trim();
      if (!query) return alert("Coin naam likho");

      hideAddModal();

      try {
        const res = await fetch(`https://api.coingecko.com/api/v3/search?query=${query}`);
        const data = await res.json();
        if (data.coins && data.coins.length > 0) {
          const coin = data.coins[0];
          showCoinDetail(coin.id, coin.name, coin.symbol, coin.price || 0);
        } else {
          alert("Coin nahi mila");
        }
      } catch(e) {
        alert("Error: " + e.message);
      }
    }

    // Auto load
    window.onload = () => {
      loadTop100();
      // Har 60 second mein auto refresh
      setInterval(loadTop100, 60000);
    };
  </script>
</body>
</html>
