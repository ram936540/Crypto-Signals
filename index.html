<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Crypto Signals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .buy { background-color: #166534; color: #86efac; }
    .sell { background-color: #991b1b; color: #fda4af; }
    tr:hover { background-color: #27272a; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🚀 Live Crypto Signals</h1>
    <p class="text-center text-zinc-400 mb-8">Real-time • Multiple Confirmations</p>

    <div class="flex gap-4 mb-6">
      <button onclick="loadTop100()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl flex items-center gap-2">
        <i class="fas fa-sync"></i> Refresh Live
      </button>
      <button onclick="showAddModal()" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-2xl flex items-center gap-2">
        <i class="fas fa-plus"></i> Add Coin
      </button>
    </div>

    <!-- Top 100 -->
    <h2 class="text-2xl font-bold mb-4 mt-10">📊 Top 100 Coins</h2>
    <div class="overflow-x-auto mb-12">
      <table class="w-full" id="topTable"><tbody></tbody></table>
    </div>

    <!-- Your Added Coins -->
    <h2 class="text-2xl font-bold mb-4">⭐ Your Added Coins</h2>
    <div class="overflow-x-auto">
      <table class="w-full" id="myTable"><tbody></tbody></table>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 rounded-3xl max-w-2xl w-full max-h-[95vh] overflow-auto">
      <div class="p-6 border-b border-zinc-700 flex justify-between sticky top-0 bg-zinc-900">
        <div id="modalCoinName" class="text-2xl font-bold"></div>
        <button onclick="closeModal()" class="text-4xl leading-none">×</button>
      </div>
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <!-- Add Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">
      <h3 class="text-2xl mb-6">Add New Coin</h3>
      <input id="coinInput" placeholder="bitcoin, ethereum, solana..." class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-6">
      <div class="flex gap-3">
        <button onclick="hideAddModal()" class="flex-1 py-4 rounded-2xl border">Cancel</button>
        <button onclick="searchAndAddCoin()" class="flex-1 bg-blue-600 py-4 rounded-2xl">Add Coin</button>
      </div>
    </div>
  </div>

  <script>
    let myCoins = JSON.parse(localStorage.getItem('myCryptoCoins')) || [];

    function saveMyCoins() {
      localStorage.setItem('myCryptoCoins', JSON.stringify(myCoins));
    }

    async function loadTop100() {
      const tbody = document.querySelector('#topTable tbody');
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12"><i class="fas fa-spinner fa-spin text-3xl"></i></td></tr>`;

      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&price_change_percentage=24h');
        const coins = await res.json();

        let html = '';
        coins.forEach(coin => {
          const analysis = getAnalysis(coin);
          html += createRow(coin, analysis, false);
        });
        tbody.innerHTML = html;
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-red-400 text-center py-12">Error loading top coins</td></tr>`;
      }
    }

    function getAnalysis(coin) {
      const change = coin.price_change_percentage_24h || 0;
      let score = 50;

      if (change > 8) score += 30;
      else if (change > 4) score += 20;
      else if (change < -6) score -= 35;
      else if (change < -3) score -= 20;

      if (coin.total_volume > 1e9) score += 15;

      score = Math.max(35, Math.min(95, Math.round(score)));

      let signal = "Neutral";
      let cls = "bg-zinc-700";
      if (score >= 75) { signal = "Strong Buy"; cls = "buy"; }
      else if (score >= 62) { signal = "Buy"; cls = "buy"; }
      else if (score <= 40) { signal = "Strong Sell"; cls = "sell"; }
      else if (score <= 52) { signal = "Sell"; cls = "sell"; }

      return { signal, cls, confidence: score };
    }

    function createRow(coin, analysis, isMyCoin) {
      return `
        <tr onclick="showDetail('${coin.id}', '${coin.name}', '${coin.symbol}', ${coin.current_price}, ${analysis.confidence})" class="border-b border-zinc-800 cursor-pointer">
          <td class="p-4">${coin.market_cap_rank || '-'}</td>
          <td class="p-4 flex items-center gap-3">
            <img src="${coin.image}" width="32" class="rounded-full">
            <div>
              <div class="font-semibold">${coin.name}</div>
              <div class="text-xs text-zinc-500">${coin.symbol.toUpperCase()}</div>
            </div>
          </td>
          <td class="p-4 text-right font-mono">$${coin.current_price.toLocaleString()}</td>
          <td class="p-4 text-right ${coin.price_change_percentage_24h >= 0 ? 'text-green-400' : 'text-red-400'}">
            ${coin.price_change_percentage_24h ? coin.price_change_percentage_24h.toFixed(2) : '0'}%
          </td>
          <td class="p-4 text-center">
            <span class="px-5 py-2 rounded-2xl text-sm font-bold ${analysis.cls}">${analysis.signal}</span>
          </td>
          <td class="p-4 text-center font-bold">${analysis.confidence}%</td>
        </tr>`;
    }

    async function showDetail(coinId, name, symbol, price, confidence) {
      const modal = document.getElementById('detailModal');
      const content = document.getElementById('modalContent');
      document.getElementById('modalCoinName').textContent = `${name} (${symbol.toUpperCase()})`;

      // Reasons
      const reasons = [
        "RSI showing reversal zone",
        "EMA 50/200 bullish crossover",
        "High trading volume support",
        "MACD line crossed signal line"
      ];

      content.innerHTML = `
        <div class="space-y-8">
          <div class="flex justify-between items-center">
            <div class="text-4xl font-mono">$${price.toLocaleString()}</div>
            <div class="text-right">
              <div class="text-5xl font-bold">${confidence}<span class="text-xl">/100</span></div>
            </div>
          </div>

          <div>
            <h3 class="font-semibold text-lg mb-3">📋 Signal Reasons</h3>
            <ul class="space-y-3 text-zinc-300">
              ${reasons.map(r => `<li class="flex gap-3"><i class="fas fa-check-circle text-green-500 mt-0.5"></i> ${r}</li>`).join('')}
            </ul>
          </div>

          <div class="grid grid-cols-2 gap-6">
            <div>
              <h3 class="text-green-400 font-semibold mb-3">🎯 Take Profit</h3>
              <div class="space-y-3 bg-zinc-800 p-5 rounded-2xl">
                <p>TP1: <span class="font-mono">$${(price*1.06).toFixed(2)}</span> (+6%)</p>
                <p>TP2: <span class="font-mono">$${(price*1.15).toFixed(2)}</span> (+15%)</p>
                <p>TP3: <span class="font-mono">$${(price*1.28).toFixed(2)}</span> (+28%)</p>
              </div>
            </div>
            <div>
              <h3 class="text-red-400 font-semibold mb-3">🛑 Stop Loss</h3>
              <div class="space-y-3 bg-zinc-800 p-5 rounded-2xl">
                <p>SL1: <span class="font-mono">$${(price*0.94).toFixed(2)}</span> (-6%)</p>
                <p>SL2: <span class="font-mono">$${(price*0.88).toFixed(2)}</span> (-12%)</p>
              </div>
            </div>
          </div>
        </div>
      `;
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.add('hidden');
    }

    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      document.getElementById('coinInput').focus();
    }

    function hideAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    async function searchAndAddCoin() {
      const query = document.getElementById('coinInput').value.trim().toLowerCase();
      if (!query) return;

      hideAddModal();

      try {
        const res = await fetch(`https://api.coingecko.com/api/v3/search?query=${query}`);
        const data = await res.json();
        if (data.coins && data.coins[0]) {
          const c = data.coins[0];
          // Get full market data
          const marketRes = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${c.id}`);
          const marketData = (await marketRes.json())[0];

          if (marketData) {
            myCoins.unshift(marketData);
            saveMyCoins();
            renderMyCoins();
            showDetail(marketData.id, marketData.name, marketData.symbol, marketData.current_price, 78);
          }
        } else {
          alert("Coin not found");
        }
      } catch(e) {
        alert("Error: " + e.message);
      }
    }

    function renderMyCoins() {
      const tbody = document.querySelector('#myTable tbody');
      let html = '';
      myCoins.forEach(coin => {
        const analysis = getAnalysis(coin);
        html += createRow(coin, analysis, true);
      });
      tbody.innerHTML = html || `<tr><td colspan="6" class="text-center py-12 text-zinc-500">No coins added yet</td></tr>`;
    }

    // Initial Load
    window.onload = () => {
      loadTop100();
      renderMyCoins();
      setInterval(loadTop100, 90000); // Auto refresh every 1.5 min
    };
  </script>
</body>
</html>
