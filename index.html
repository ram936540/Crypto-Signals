<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Crypto Signals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .buy { background-color: #166534; color: #86efac; }
    .sell { background-color: #991b1b; color: #fda4af; }
    .neutral { background-color: #44403c; color: #d1d5db; }
    .tab-active { border-bottom: 4px solid #3b82f6; font-weight: 600; }
    tr:hover { background-color: #27272a; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🚀 Live Crypto Signals</h1>
    <p class="text-center text-red-400 mb-8">Educational Tool Only • Not Financial Advice</p>

    <!-- Tabs -->
    <div class="flex border-b border-zinc-700 mb-8">
      <button onclick="switchTab(0)" id="tab0" class="tab-active px-10 py-4">📊 Signals (Top 100)</button>
      <button onclick="switchTab(1)" id="tab1" class="px-10 py-4">💼 My Portfolio</button>
    </div>

    <!-- Signals Tab -->
    <div id="content0">
      <button onclick="loadTop100()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl mb-6 flex items-center gap-2">
        <i class="fas fa-sync"></i> Refresh All Signals
      </button>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-zinc-900">
              <th class="p-4 text-left">#</th>
              <th class="p-4 text-left">Coin</th>
              <th class="p-4 text-right">Price</th>
              <th class="p-4 text-right">24h %</th>
              <th class="p-4 text-center">Signal</th>
              <th class="p-4 text-center">Confidence</th>
            </tr>
          </thead>
          <tbody id="topTable" class="text-sm"></tbody>
        </table>
      </div>
    </div>

    <!-- Portfolio Tab -->
    <div id="content1" class="hidden">
      <button onclick="showAddPortfolioModal()" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-2xl mb-6 flex items-center gap-2">
        <i class="fas fa-plus"></i> Add Coin to Portfolio
      </button>

      <div id="portfolioSummary" class="bg-zinc-900 p-6 rounded-3xl mb-6 text-xl font-semibold"></div>

      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-zinc-900">
              <th class="p-4 text-left">Coin</th>
              <th class="p-4 text-right">Price</th>
              <th class="p-4 text-right">Quantity</th>
              <th class="p-4 text-right">Value</th>
              <th class="p-4 text-center">Signal</th>
              <th class="p-4 text-center">Action</th>
            </tr>
          </thead>
          <tbody id="portfolioTable" class="text-sm"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Coin Detail Modal -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 rounded-3xl max-w-2xl w-full max-h-[95vh] overflow-auto">
      <div class="p-6 border-b border-zinc-700 flex justify-between sticky top-0 bg-zinc-900">
        <div id="modalCoinName" class="text-2xl font-bold"></div>
        <button onclick="closeModal()" class="text-4xl hover:text-red-400">×</button>
      </div>
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <!-- Add to Portfolio Modal -->
  <div id="addPortfolioModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">
      <h3 class="text-2xl mb-6">Add Coin to Portfolio</h3>
      <input id="portCoinInput" placeholder="bitcoin, solana, ethereum..." class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-4">
      <input id="portQuantity" type="number" step="0.00001" placeholder="Quantity (e.g. 1.5)" class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-6">
      <div class="flex gap-3">
        <button onclick="hideAddPortfolioModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700">Cancel</button>
        <button onclick="addToPortfolio()" class="flex-1 bg-purple-600 py-4 rounded-2xl">Add to Portfolio</button>
      </div>
    </div>
  </div>

  <script>
    let portfolio = JSON.parse(localStorage.getItem('myPortfolio')) || [];

    function savePortfolio() {
      localStorage.setItem('myPortfolio', JSON.stringify(portfolio));
    }

    function switchTab(tab) {
      document.getElementById('content0').classList.add('hidden');
      document.getElementById('content1').classList.add('hidden');
      document.getElementById('content' + tab).classList.remove('hidden');

      document.getElementById('tab0').classList.remove('tab-active');
      document.getElementById('tab1').classList.remove('tab-active');
      document.getElementById('tab' + tab).classList.add('tab-active');
    }

    async function loadTop100() {
      const tbody = document.getElementById('topTable');
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12"><i class="fas fa-spinner fa-spin text-3xl"></i></td></tr>`;

      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&price_change_percentage=24h');
        const coins = await res.json();

        let html = '';
        for (let coin of coins) {
          const analysis = getBasicAnalysis(coin);
          html += `
            <tr onclick="showDetail('${coin.id}', '${coin.name}', '${coin.symbol}', ${coin.current_price})" class="border-b border-zinc-800 cursor-pointer">
              <td class="p-4">${coin.market_cap_rank}</td>
              <td class="p-4 flex items-center gap-3">
                <img src="${coin.image}" width="32" class="rounded-full">
                <div><div class="font-semibold">${coin.name}</div><div class="text-xs text-zinc-500">${coin.symbol.toUpperCase()}</div></div>
              </td>
              <td class="p-4 text-right font-mono">$${coin.current_price.toLocaleString()}</td>
              <td class="p-4 text-right ${coin.price_change_percentage_24h >= 0 ? 'text-green-400' : 'text-red-400'}">
                ${coin.price_change_percentage_24h ? coin.price_change_percentage_24h.toFixed(2) : '0'}%
              </td>
              <td class="p-4 text-center"><span class="px-5 py-2 rounded-2xl text-sm font-bold ${analysis.cls}">${analysis.signal}</span></td>
              <td class="p-4 text-center font-bold">${analysis.confidence}%</td>
            </tr>`;
        }
        tbody.innerHTML = html;
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-red-400 text-center py-12">Error loading data. Refresh karo.</td></tr>`;
      }
    }

    function getBasicAnalysis(coin) {
      const ch = coin.price_change_percentage_24h || 0;
      let score = 50 + (ch * 1.8);
      if (coin.total_volume > 800000000) score += 12;
      score = Math.max(35, Math.min(95, Math.round(score)));

      let signal = "Neutral", cls = "neutral";
      if (score >= 73) { signal = "Strong Buy"; cls = "buy"; }
      else if (score >= 60) { signal = "Buy"; cls = "buy"; }
      else if (score <= 38) { signal = "Strong Sell"; cls = "sell"; }
      else if (score <= 50) { signal = "Sell"; cls = "sell"; }
      return { signal, cls, confidence: score };
    }

    async function showDetail(coinId, name, symbol, price) {
      const modal = document.getElementById('detailModal');
      document.getElementById('modalCoinName').textContent = `${name} (${symbol.toUpperCase()})`;
      const content = document.getElementById('modalContent');

      content.innerHTML = `<div class="py-20 text-center"><i class="fas fa-spinner fa-spin text-4xl"></i><br>RSI + EMA + Momentum Analyze Kar Raha Hun...</div>`;
      modal.classList.remove('hidden');

      try {
        const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=30`);
        const data = await res.json();
        const prices = data.prices.map(p => p[1]);

        const analysis = getRealAnalysis(prices, price);

        let tpHTML = '';
        let slHTML = '';

        if (analysis.signal.includes("Buy")) {
          tpHTML = `<p>TP1: $${(price*1.06).toFixed(2)} (+6%)</p><p>TP2: $${(price*1.15).toFixed(2)} (+15%)</p><p>TP3: $${(price*1.28).toFixed(2)} (+28%)</p>`;
          slHTML = `<p>SL1: $${(price*0.94).toFixed(2)} (-6%)</p><p>SL2: $${(price*0.88).toFixed(2)} (-12%)</p>`;
        } else if (analysis.signal.includes("Sell")) {
          tpHTML = `<p>TP1: $${(price*0.94).toFixed(2)} (-6%)</p><p>TP2: $${(price*0.87).toFixed(2)} (-13%)</p><p>TP3: $${(price*0.78).toFixed(2)} (-22%)</p>`;
          slHTML = `<p>SL1: $${(price*1.07).toFixed(2)} (+7%)</p><p>SL2: $${(price*1.15).toFixed(2)} (+15%)</p>`;
        }

        content.innerHTML = `
          <div class="space-y-8">
            <div class="flex justify-between items-center">
              <div class="text-4xl font-mono">$${price.toLocaleString()}</div>
              <div class="text-right">
                <span class="text-5xl font-bold ${analysis.cls}">${analysis.confidence}</span><span class="text-xl">/100</span>
              </div>
            </div>

            <div>
              <h3 class="font-semibold mb-4">📋 Multiple Confirmation Reasons</h3>
              <ul class="space-y-3">${analysis.reasons.map(r => `<li class="flex gap-3"><i class="fas fa-check-circle mt-1 ${r.includes('Bearish') || r.includes('Overbought') ? 'text-red-500' : 'text-green-500'}"></i> ${r}</li>`).join('')}</ul>
            </div>

            ${analysis.signal !== "Neutral" ? `
            <div class="grid grid-cols-2 gap-6">
              <div>
                <h3 class="text-green-400 font-semibold mb-3">🎯 Take Profit Targets</h3>
                <div class="bg-zinc-800 p-5 rounded-2xl space-y-2">${tpHTML}</div>
              </div>
              <div>
                <h3 class="text-red-400 font-semibold mb-3">🛑 Stop Loss Targets</h3>
                <div class="bg-zinc-800 p-5 rounded-2xl space-y-2">${slHTML}</div>
              </div>
            </div>` : `<p class="text-yellow-400 text-center py-6">Neutral Signal - Abhi Trade mat karo</p>`}
          </div>
        `;
      } catch(e) {
        content.innerHTML = `<p class="text-red-400 text-center py-10">Technical analysis mein error aaya. Baad mein try karo.</p>`;
      }
    }

    function getRealAnalysis(prices, currentPrice) {
      if (prices.length < 20) return {confidence: 50, signal: "Neutral", reasons: ["Data kam hai"]};

      const rsi = calculateRSI(prices);
      const ema12 = calculateEMA(prices, 12);
      const ema26 = calculateEMA(prices, 26);
      const momentum = ((prices[prices.length-1] - prices[prices.length-10]) / prices[prices.length-10]) * 100;

      let score = 50;
      let reasons = [];

      if (rsi < 35) { score += 25; reasons.push("RSI Oversold (<35) → Strong Reversal Chance"); }
      else if (rsi > 65) { score -= 25; reasons.push("RSI Overbought (>65) → Pullback Expected"); }
      else reasons.push(`RSI Neutral (${rsi.toFixed(1)})`);

      if (ema12 > ema26) { score += 22; reasons.push("EMA12 > EMA26 → Bullish Trend"); }
      else { score -= 20; reasons.push("EMA12 < EMA26 → Bearish Trend"); }

      if (momentum > 8) { score += 18; reasons.push("Strong Positive Momentum"); }
      else if (momentum < -8) { score -= 20; reasons.push("Strong Negative Momentum"); }

      let signal = "Neutral", cls = "neutral";
      if (score >= 75) { signal = "Strong Buy"; cls = "buy"; }
      else if (score >= 62) { signal = "Buy"; cls = "buy"; }
      else if (score <= 38) { signal = "Strong Sell"; cls = "sell"; }
      else if (score <= 50) { signal = "Sell"; cls = "sell"; }

      return { confidence: Math.max(40, Math.min(95, Math.round(score))), signal, cls, reasons };
    }

    function calculateRSI(prices, period = 14) {
      let gains = 0, losses = 0;
      for (let i = 1; i < period + 1; i++) {
        const change = prices[i] - prices[i-1];
        if (change > 0) gains += change;
        else losses -= change;
      }
      const rs = gains / losses || 1;
      return 100 - (100 / (1 + rs));
    }

    function calculateEMA(prices, period) {
      let ema = prices[0];
      const k = 2 / (period + 1);
      for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
      }
      return ema;
    }

    function closeModal() {
      document.getElementById('detailModal').classList.add('hidden');
    }

    // Portfolio Functions
    function showAddPortfolioModal() {
      document.getElementById('addPortfolioModal').classList.remove('hidden');
    }

    function hideAddPortfolioModal() {
      document.getElementById('addPortfolioModal').classList.add('hidden');
    }

    async function addToPortfolio() {
      const query = document.getElementById('portCoinInput').value.trim();
      const qty = parseFloat(document.getElementById('portQuantity').value);

      if (!query || !qty) return alert("Coin naam aur quantity dono daalo");

      hideAddPortfolioModal();

      try {
        const searchRes = await fetch(`https://api.coingecko.com/api/v3/search?query=${query}`);
        const searchData = await searchRes.json();
        const coin = searchData.coins[0];
        if (!coin) return alert("Coin nahi mila");

        const marketRes = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${coin.id}`);
        const coinData = (await marketRes.json())[0];

        portfolio.push({ ...coinData, quantity: qty });
        savePortfolio();
        renderPortfolio();
      } catch(e) {
        alert("Error: " + e.message);
      }
    }

    function renderPortfolio() {
      let totalValue = 0;
      let html = '';

      portfolio.forEach((item, index) => {
        const value = item.current_price * item.quantity;
        totalValue += value;
        const analysis = getBasicAnalysis(item);

        html += `
          <tr class="border-b border-zinc-800">
            <td class="p-4 flex items-center gap-3">
              <img src="${item.image}" width="32" class="rounded-full">
              <div>${item.name}</div>
            </td>
            <td class="p-4 text-right">$${item.current_price.toLocaleString()}</td>
            <td class="p-4 text-right">${item.quantity}</td>
            <td class="p-4 text-right font-bold">$${value.toLocaleString()}</td>
            <td class="p-4 text-center"><span class="px-4 py-1 rounded-2xl text-sm ${analysis.cls}">${analysis.signal}</span></td>
            <td class="p-4 text-center">
              <button onclick="removeFromPortfolio(${index})" class="text-red-500 hover:text-red-400">Remove</button>
            </td>
          </tr>`;
      });

      document.getElementById('portfolioSummary').innerHTML = `
        Total Portfolio Value: <span class="text-green-400">$${totalValue.toLocaleString()}</span> 
        <span class="text-zinc-400">(${portfolio.length} coins)</span>
      `;

      document.getElementById('portfolioTable').innerHTML = html || `<tr><td colspan="6" class="text-center py-12 text-zinc-500">Portfolio khali hai. Add button se coins add karo.</td></tr>`;
    }

    function removeFromPortfolio(index) {
      portfolio.splice(index, 1);
      savePortfolio();
      renderPortfolio();
    }

    // Initialize
    window.onload = () => {
      loadTop100();
      renderPortfolio();
      setInterval(loadTop100, 120000); // Auto refresh every 2 minutes
    };
  </script>
</body>
</html>
