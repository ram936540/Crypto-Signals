/* ===========================
BINANCE API
=========================== */

const BINANCE_FAPI =
"https://fapi.binance.com";

async function getJSON(url){

try{

const res = await fetch(url);

return await res.json();

}catch(err){

console.error(err);

return null;

}

}

/* ===========================
TOP 100 FUTURES COINS
=========================== */

async function loadTopCoins(){

try{

const data = await getJSON(
`${BINANCE_FAPI}/fapi/v1/ticker/24hr`
);

if(!data) return [];

const filtered = data
.filter(x =>
x.symbol.endsWith("USDT")
)
.sort(
(a,b)=>
parseFloat(b.quoteVolume) -
parseFloat(a.quoteVolume)
)
.slice(0,CONFIG.TOP_COINS_LIMIT)
.map(x=>x.symbol);

return filtered;

}catch(e){

console.log(e);

return [];

}

}

/* ===========================
KLINES
=========================== */

async function getCandles(
symbol,
interval,
limit=300
){

const data = await getJSON(

`${BINANCE_FAPI}/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`

);

if(!Array.isArray(data))
return [];

return data.map(c=>({

time:+c[0],

open:+c[1],

high:+c[2],

low:+c[3],

close:+c[4],

volume:+c[5]

}));

}

/* ===========================
EMA
=========================== */

function EMA(values,period){

const k = 2/(period+1);

let ema = values[0];

for(let i=1;i<values.length;i++){

ema =
values[i]*k +
ema*(1-k);

}

return ema;

}

/* ===========================
SMA
=========================== */

function SMA(values,period){

const slice =
values.slice(-period);

const sum =
slice.reduce(
(a,b)=>a+b,0
);

return sum/period;

}

/* ===========================
RSI
=========================== */

function RSI(values,period=14){

let gains=0;
let losses=0;

for(
let i=values.length-period;
i<values.length;
i++
){

const diff =
values[i] -
values[i-1];

if(diff>0){

gains+=diff;

}else{

losses+=Math.abs(diff);

}

}

if(losses===0)
return 100;

const rs =
(gains/period) /
(losses/period);

return 100 -
(100/(1+rs));

}

/* ===========================
ATR
=========================== */

function ATR(
candles,
period=14
){

const trs=[];

for(
let i=1;
i<candles.length;
i++
){

const current =
candles[i];

const prev =
candles[i-1];

const tr =
Math.max(

current.high-current.low,

Math.abs(
current.high-prev.close
),

Math.abs(
current.low-prev.close
)

);

trs.push(tr);

}

const recent =
trs.slice(-period);

const atr =
recent.reduce(
(a,b)=>a+b,0
)/period;

return atr;

}

/* ===========================
MACD
=========================== */

function MACD(closes){

const ema12 =
EMA(closes.slice(-100),12);

const ema26 =
EMA(closes.slice(-100),26);

const macd =
ema12 - ema26;

return macd;

}

/* ===========================
VOLUME SPIKE
=========================== */

function volumeSpike(
candles
){

const vols =
candles.map(
x=>x.volume
);

const current =
vols[vols.length-1];

const avg =
SMA(vols,20);

return {

current,

avg,

ratio:
current/avg

};

}

/* ===========================
EMA STRUCTURE
=========================== */

function emaStructure(
closes
){

const ema20 =
EMA(
closes.slice(-100),
20
);

const ema50 =
EMA(
closes.slice(-150),
50
);

const ema200 =
EMA(
closes,
200
);

return {

ema20,
ema50,
ema200,

bullish:
ema20 >
ema50 &&
ema50 >
ema200,

bearish:
ema20 <
ema50 &&
ema50 <
ema200

};

}

/* ===========================
MARKET STRUCTURE
=========================== */

function structure(
candles
){

const recent =
candles.slice(-10);

const highs =
recent.map(
x=>x.high
);

const lows =
recent.map(
x=>x.low
);

const lastHigh =
highs[highs.length-1];

const prevHigh =
highs[0];

const lastLow =
lows[lows.length-1];

const prevLow =
lows[0];

return {

bullish:
lastHigh > prevHigh &&
lastLow > prevLow,

bearish:
lastHigh < prevHigh &&
lastLow < prevLow

};

}

/* ===========================
BREAKOUT
=========================== */

function breakout(
candles
){

const recent =
candles.slice(-30);

const closes =
recent.map(
x=>x.close
);

const current =
closes[closes.length-1];

const highest =
Math.max(
...closes.slice(0,-1)
);

const lowest =
Math.min(
...closes.slice(0,-1)
);

return {

bullish:
current >
highest,

bearish:
current <
lowest

};

}

/* ===========================
BTC TREND CACHE
=========================== */

async function updateBTCTrend(){

const candles =
await getCandles(
"BTCUSDT",
CONFIG.TIMEFRAMES.MAIN,
250
);

const closes =
candles.map(
x=>x.close
);

const ema =
emaStructure(
closes
);

if(ema.bullish){

state.btcTrend =
"bullish";

}else if(
ema.bearish
){

state.btcTrend =
"bearish";

}else{

state.btcTrend =
"neutral";

}

}

/* ===========================
TIMEFRAME ANALYSIS
=========================== */

async function analyzeTimeframe(
symbol,
timeframe
){

const candles =
await getCandles(
symbol,
timeframe,
300
);

if(
!candles ||
candles.length < 220
){

return null;

}

const closes =
candles.map(
x=>x.close
);

const currentPrice =
closes[
closes.length-1
];

const ema =
emaStructure(
closes
);

const rsi =
RSI(closes);

const macd =
MACD(closes);

const vol =
volumeSpike(
candles
);

const ms =
structure(
candles
);

const bo =
breakout(
candles
);

const atr =
ATR(
candles
);

return {

price:
currentPrice,

ema,

rsi,

macd,

volume:
vol,

structure:
ms,

breakout:
bo,

atr,

candles

};

}

/* ===========================
15M SCORE
=========================== */

function score15m(
data
){

let score = 0;

let reasons=[];

if(
data.ema.bullish
){

score += 20;

reasons.push(
"15M EMA Bullish"
);

}

if(
data.rsi > 55
&&
data.rsi < 75
){

score += 15;

reasons.push(
`15M RSI ${data.rsi.toFixed(1)}`
);

}

if(
data.macd > 0
){

score += 15;

reasons.push(
"15M MACD Bullish"
);

}

if(
data.volume.ratio > 1.5
){

score += 20;

reasons.push(
`15M Volume ${data.volume.ratio.toFixed(1)}x`
);

}

if(
data.breakout.bullish
){

score += 15;

reasons.push(
"15M Breakout"
);

}

if(
data.structure.bullish
){

score += 15;

reasons.push(
"15M Structure Bullish"
);

}

return {

score,

reasons

};

}

1H SCORE

data
){

4H SCORE

function score4h(

){

/* ===========================
BEARISH SCORING
=========================== */

function bearishScore(
m15,
h1,
h4
){

let score = 0;

let reasons=[];

if(
m15.ema.bearish
){

score += 15;
reasons.push(
"15M EMA Bearish"
);

}

if(
h1.ema.bearish
){

score += 20;

"1H EMA Bearish"
);

}

if(

){

"4H EMA Bearish"
);

}

if(
m15.macd < 0
){

score += 10;
reasons.push(
"15M MACD Bearish"
);

}

if(
h1.macd < 0
){

score += 10;
reasons.push(
"1H MACD Bearish"
);

}

if(
h4.macd < 0
){

score += 10;
reasons.push(
"4H MACD Bearish"
);

}

if(
m15.structure.bearish
){

score += 5;
reasons.push(
"15M Structure Bearish"
);

}

if(
h1.structure.bearish
){

score += 5;
reasons.push(
"1H Structure Bearish"
);

}

return {

score,

reasons

};

}

/* ===========================
FULL ANALYSIS
=========================== */

async function analyzeCoin(
symbol
){

const tf15 =
await analyzeTimeframe(
symbol,
CONFIG.TIMEFRAMES.ENTRY
);

const tf1h =
await analyzeTimeframe(
symbol,
CONFIG.TIMEFRAMES.MAIN
);

const tf4h =
await analyzeTimeframe(
symbol,
CONFIG.TIMEFRAMES.TREND
);

if(
!tf15 ||
!tf1h ||
!tf4h
){

return null;

}

const s15 =
score15m(tf15);

const s1 =
score1h(tf1h);

const s4 =
score4h(tf4h);

let confidence =

(
s15.score * 0.25
)+
(
s1.score * 0.35
)+
(
s4.score * 0.40
);

let reasons = [

...s15.reasons,
...s1.reasons,
...s4.reasons

];

const bear =
bearishScore(
tf15,
tf1h,
tf4h
);

let signal = null;

/* STRONG BUY */

if(

tf15.ema.bullish &&

tf1h.ema.bullish &&

tf4h.ema.bullish &&

state.btcTrend ===
"bullish"

){

confidence += 10;

signal =
"STRONG BUY";

reasons.push(
"BTC Bullish Confirmation"
);

}

/* STRONG SELL */

if(

bear.score >= 80 &&

state.btcTrend ===
"bearish"

){

confidence += 10;

signal =
"STRONG SELL";

reasons =

bear.reasons;

}

/* FILTER */

if(
confidence <
CONFIG.MIN_CONFIDENCE
){

return null;

}

return {

symbol,

signal,

confidence:
Math.min(
100,
Math.round(
confidence
)
),

price:
tf1h.price,

atr:
tf1h.atr,

reasons,

tf15,

tf1h,

tf4h

};

}

/* ===========================
TP / SL ENGINE
=========================== */

function buildTargets(price, atr, signal){

const risk = atr * 1.5;

if(signal === "STRONG BUY"){

const sl  = price - risk;
const tp1 = price + (risk * 1.5);
const tp2 = price + (risk * 3);
const tp3 = price + (risk * 5);

return {
entry: price,
sl,
tp1,
tp2,
tp3
};

}

const sl  = price + risk;
const tp1 = price - (risk * 1.5);
const tp2 = price - (risk * 3);
const tp3 = price - (risk * 5);

return {
entry: price,
sl,
tp1,
tp2,
tp3
};

}

/* ===========================
RENDER SIGNAL
=========================== */

function renderSignal(signal){

const elite =
signal.confidence >=
CONFIG.ELITE_CONFIDENCE;

const targets =
buildTargets(
signal.price,
signal.atr,
signal.signal
);

return `

<div class="signal-card ${signal.signal === 'STRONG BUY' ? 'buy':'sell'}">

<div class="signal-header">

<div class="signal-title">

${signal.signal === 'STRONG BUY'
? '🚀 STRONG BUY'
: '🔻 STRONG SELL'}

&nbsp; ${signal.symbol}

</div>

<div class="confidence">

${signal.confidence}%

</div>

</div>

<div class="status ${elite ? 'green':'yellow'}">

${elite
? '🔥 ELITE SIGNAL'
: '⚡ HIGH CONFIDENCE'}

</div>

<div class="grid">

<div class="box">

<b>Entry</b><br>
${round(targets.entry)}

<br><br>

<b>Stop Loss</b><br>
${round(targets.sl)}

</div>

<div class="box">

<b>TP1</b><br>
${round(targets.tp1)}

<br><br>

<b>TP2</b><br>
${round(targets.tp2)}

<br><br>

<b>TP3</b><br>
${round(targets.tp3)}

</div>

</div>

<div class="box" style="margin-top:15px;">

<b>Reasons</b>

${signal.reasons
.slice(0,10)
.map(x=>
`<div class="reason">✅ ${x}</div>`
)
.join("")}

</div>

</div>

`;

}

/* ===========================
SCAN LIST
=========================== */

async function getScanList(){

const topCoins =
await loadTopCoins();

const custom =
document
.getElementById(
"customCoins"
)
.value
.split("\n")
.map(x=>x.trim())
.filter(Boolean);

const merged =
[
...topCoins,
...custom
];

return [...new Set(merged)];

}

/* ===========================
SCAN ENGINE
=========================== */

async function runScan(){

if(state.isScanning)
return;

state.isScanning = true;

document
.getElementById(
"signals"
)
.innerHTML =

`
<div class="panel">
<div class="loading">
Scanning Market...
</div>
</div>
`;

await updateBTCTrend();

const coins =
await getScanList();

document
.getElementById(
"totalCoins"
)
.innerText =
coins.length;

let buyCount = 0;
let sellCount = 0;
let eliteCount = 0;

const signals = [];

for(const coin of coins){

try{

const result =
await analyzeCoin(
coin
);

if(result){

signals.push(
result
);

if(
result.signal ===
"STRONG BUY"
){
buyCount++;
}

if(
result.signal ===
"STRONG SELL"
){
sellCount++;
}

if(
result.confidence >=
95
){
eliteCount++;
}

}

}catch(err){

console.log(
coin,
err
);

}

await sleep(100);

}

signals.sort(
(a,b)=>
b.confidence -
a.confidence
);

state.signals =
signals;

document
.getElementById(
"buyCount"
)
.innerText =
buyCount;

document
.getElementById(
"sellCount"
)
.innerText =
sellCount;

document
.getElementById(
"eliteCount"
)
.innerText =
eliteCount;

if(
signals.length === 0
){

document
.getElementById(
"signals"
)
.innerHTML =

`
<div class="panel">

No 90%+ signals found.

</div>
`;

state.isScanning =
false;

return;

}

document
.getElementById(
"signals"
)
.innerHTML =

signals
.map(
renderSignal
)
.join("");

state.isScanning =
false;

}

/* ===========================
BUTTON
=========================== */

document
.getElementById(
"scanBtn"
)
addEventListener(
"click",
runScan
);

/* ===========================
AUTO REFRESH
=========================== */

setInterval(

()=>{

if(
!state.isScanning
){

runScan();

}

},

CONFIG
.REFRESH_INTERVAL

);

/* ===========================
AUTO START
=========================== */

runScan();

/* ===========================
END
=========================== */
