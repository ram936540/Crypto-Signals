<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Crypto Signals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@ixjb94/indicators-js@latest/dist/index.umd.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .signal-buy { background-color: #166534; color: #86efac; }
    .signal-sell { background-color: #991b1b; color: #fda4af; }
    .signal-neutral { background-color: #44403c; color: #d1d5db; }
    tr:hover { background-color: #27272a !important; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🚀 Smart Crypto Signals</h1>
    <p class="text-center text-zinc-400 mb-6">Multiple Confirmations • RSI + MACD + EMA + Volume</p>

    <div class="flex justify-between mb-6">
      <button onclick="showAddModal()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl flex items-center gap-2 font-medium">
        <i class="fas fa-plus"></i> Add Coin
      </button>
      <button onclick="loadTop100()" class="bg-zinc-700 hover:bg-zinc-600 px-6 py-3 rounded-2xl flex items-center gap-2">
        <i class="fas fa-sync"></i> Refresh Top 100
      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-zinc-900">
            <th class="p-4 text-left">#</th>
            <th class="p-4 text-left">Coin</th>
            <th class="p-4 text-right">Price</th>
            <th class="p-4 text-right">24h</th>
            <th class="p-4 text-center">Signal</th>
            <th class="p-4 text-center">Confidence</th>
          </tr>
        </thead>
        <tbody id="mainTable" class="text-sm"></tbody>
      </table>
    </div>
  </div>

  <!-- Add Coin Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md">
      <h3 class="text-2xl mb-4">Add Coin for Analysis</h3>
      <input id="searchInput" placeholder="bitcoin, ethereum, solana..." class="w-full bg-zinc-800 px-5 py-4 rounded-2xl mb-4">
      <div class="flex gap-3">
        <button onclick="hideModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700">Cancel</button>
        <button onclick="analyzeNewCoin()" class="flex-1 bg-blue-600 py-4 rounded-2xl">Analyze & Add</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center overflow-auto">
    <div id="detailContent" class="bg-zinc-900 rounded-3xl max-w-2xl w-full m-4"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
    const SUPABASE_ANON = 'YOUR_ANON_KEY';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    async function loadTop100() {
      const tbody = document.getElementById('mainTable');
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12"><i class="fas fa-spinner fa-spin text-3xl"></i></td></tr>`;

      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&price_change_percentage=24h');
        const coins = await res.json();

        let html = '';
        for (let coin of coins) {
          const analysis = await getQuickAnalysis(coin.id, coin.current_price);
          html += `
            <tr onclick="showDetail('${coin.id}', '${coin.name}', '${coin.symbol}', ${coin.current_price})" class="border-b border-zinc-800 cursor-pointer">
              <td class="p-4">${coin.market_cap_rank}</td>
              <td class="p-4 flex items-center gap-3">
                <img src="${coin.image}" width="32" class="rounded-full">
                <div><div class="font-semibold">${coin.name}</div><div class="text-xs text-zinc-500">${coin.symbol.toUpperCase()}</div></div>
              </td>
              <td class="p-4 text-right font-mono">$${coin.current_price.toLocaleString()}</td>
              <td class="p-4 text-right ${coin.price_change_percentage_24h >= 0 ? 'text-green-400' : 'text-red-400'}">
                ${coin.price_change_percentage_24h?.toFixed(2)}%
              </td>
              <td class="p-4 text-center">
                <span class="px-5 py-2 rounded-2xl text-sm font-bold ${analysis.signalClass}">${analysis.signal}</span>
              </td>
              <td class="p-4 text-center font-bold text-lg">${analysis.confidence}<span class="text-xs align-top">/100</span></td>
            </tr>
          `;
        }
        tbody.innerHTML = html;
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-red-400 text-center py-12">Error loading data</td></tr>`;
      }
    }

    async function getQuickAnalysis(coinId, currentPrice) {
      try {
        const histRes = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=14&interval=daily`);
        const hist = await histRes.json();
        const prices = hist.prices.map(p => p[1]);

        if (prices.length < 14) return {signal: "Neutral", signalClass: "signal-neutral", confidence: 50};

        // Using indicators-js library
        const rsi = Indicators.RSI(prices, 14);
        const ema12 = Indicators.EMA(prices, 12);
        const ema26 = Indicators.EMA(prices, 26);
        const macd = ema12[ema12.length-1] - ema26[ema26.length-1];

        let score = 50;
        let reasons = [];

        if (rsi[rsi.length-1] < 35) { score += 22; reasons.push("RSI Oversold"); }
        if (rsi[rsi.length-1] > 65) { score -= 22; reasons.push("RSI Overbought"); }
        if (macd > 0) { score += 18; reasons.push("MACD Bullish"); }
        if (ema12[ema12.length-1] > ema26[ema26.length-1]) { score += 20; reasons.push("EMA Bullish"); }

        let signal = "Neutral";
        let signalClass = "signal-neutral";
        if (score >= 75) { signal = "Strong Buy"; signalClass = "signal-buy"; }
        else if (score >= 60) { signal = "Buy"; signalClass = "signal-buy"; }
        else if (score <= 35) { signal = "Strong Sell"; signalClass = "signal-sell"; }
        else if (score <= 45) { signal = "Sell"; signalClass = "signal-sell"; }

        return { signal, signalClass, confidence: Math.round(Math.min(98, Math.max(30, score))), reasons };
      } catch(e) {
        return { signal: "Neutral", signalClass: "signal-neutral", confidence: 50, reasons: [] };
      }
    }

    async function showDetail(coinId, name, symbol, price) {
      const modal = document.getElementById('detailModal');
      const content = document.getElementById('detailContent');
      
      content.innerHTML = `<div class="p-12 text-center"><i class="fas fa-spinner fa-spin text-4xl"></i></div>`;
      modal.classList.remove('hidden');

      const analysis = await getQuickAnalysis(coinId, price);
      
      let html = `
        <div class="p-8">
          <div class="flex justify-between items-start">
            <div>
              <h2 class="text-3xl font-bold">${name} (${symbol.toUpperCase()})</h2>
              <p class="text-3xl font-mono mt-1">$${price.toLocaleString()}</p>
            </div>
            <button onclick="hideDetailModal()" class="text-3xl">✕</button>
          </div>

          <div class="mt-8 flex gap-6 items-center">
            <span class="px-8 py-4 text-2xl font-bold rounded-3xl ${analysis.signalClass}">${analysis.signal}</span>
            <div class="text-5xl font-bold">${analysis.confidence}<span class="text-2xl align-top">/100</span></div>
          </div>

          <div class="mt-10 grid grid-cols-2 gap-8">
            <div>
              <h3 class="font-semibold mb-4">📋 Signal Reasons</h3>
              <ul class="space-y-3">
                ${analysis.reasons.map(r => `<li class="flex gap-3"><i class="fas fa-check-circle text-green-500 mt-1"></i> ${r}</li>`).join('')}
              </ul>
            </div>
            <div>
              <h3 class="font-semibold mb-4">🎯 Targets</h3>
              <div class="space-y-4">
                <div class="bg-zinc-800 p-5 rounded-2xl">
                  <p class="text-green-400 mb-2 font-medium">Take Profit</p>
                  <p>TP1: $${(price * 1.06).toFixed(2)} (+6%)</p>
                  <p>TP2: $${(price * 1.15).toFixed(2)} (+15%)</p>
                  <p>TP3: $${(price * 1.28).toFixed(2)} (+28%)</p>
                </div>
                <div class="bg-zinc-800 p-5 rounded-2xl">
                  <p class="text-red-400 mb-2 font-medium">Stop Loss</p>
                  <p>SL1: $${(price * 0.94).toFixed(2)} (-6%)</p>
                  <p>SL2: $${(price * 0.88).toFixed(2)} (-12%)</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      content.innerHTML = html;
    }

    function hideDetailModal() {
      document.getElementById('detailModal').classList.add('hidden');
    }

    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      document.getElementById('searchInput').focus();
    }

    function hideModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    async function analyzeNewCoin() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      hideModal();
      // For now redirect to detail (you can extend to save in list)
      const searchRes = await fetch(`https://api.coingecko.com/api/v3/search?query=${query}`);
      const data = await searchRes.json();
      if (data.coins && data.coins[0]) {
        const c = data.coins[0];
        showDetail(c.id, c.name, c.symbol, c.price || 0);
      }
    }

    // Load on start
    window.onload = loadTop100;
  </script>
</body>
</html>
